<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="市场波动时，先把生活目标和情绪分开。" />
    <title>冷静一下｜理财决策陪伴</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <span class="eyebrow">MONEY WHISPERER · DECISION SAFETY</span>
        <h1>市场变了，<br /><em>你的目标变了吗？</em></h1>
        <p>它不替你炒股。它只在你最慌的时候，帮你把生活目标、现金流和情绪重新摆回桌面。</p>
      </header>

      <section class="workspace">
        <form id="assessment-form" class="panel form-panel">
          <div class="panel-heading">
            <span>01</span>
            <div><h2>说清楚这次决定</h2><p>无需账户、API Key 或投资知识</p></div>
          </div>

          <label>这笔钱原本为了什么？<input name="goal" value="三年后买车" required /></label>
          <div class="two">
            <label>距离目标还有几个月？<input name="horizon_months" type="number" min="0" value="36" required /></label>
            <label>应急资金可覆盖几个月？<input name="emergency_months" type="number" min="0" step="0.5" value="2" required /></label>
          </div>
          <div class="two">
            <label>高波动资产占比（%）<input name="risky_asset_pct" type="number" min="0" max="100" value="75" required /></label>
            <label>近期市场涨跌（%）<input name="market_change_pct" type="number" min="-100" max="100" value="-10" required /></label>
          </div>
          <label>你现在想做什么？<textarea name="intended_action" required>我很害怕继续下跌，想马上清仓</textarea></label>
          <label class="check"><input name="goal_changed" type="checkbox" /><span>我的生活目标或用钱时间确实已经变化</span></label>
          <button id="submit-button" type="submit">先帮我冷静一下 <span>→</span></button>
          <p class="fineprint">不会连接券商，不执行交易，不推荐具体证券。</p>
        </form>

        <section class="panel result-panel" aria-live="polite">
          <div class="panel-heading">
            <span>02</span>
            <div><h2>决策压力检查</h2><p>先看风险，再讨论动作</p></div>
          </div>
          <div id="empty-state" class="empty">
            <div class="breath"></div>
            <strong>先深呼吸一次</strong>
            <p>提交左侧信息后，这里会生成一份不含买卖指令的决策整理。</p>
          </div>
          <div id="result" class="result hidden">
            <div class="score-row">
              <div><span>决策压力</span><strong id="score">0</strong><small>/100</small></div>
              <span id="state-badge" class="badge">等待</span>
            </div>
            <h3 id="headline"></h3>
            <div class="section"><h4>为什么需要停一下</h4><div id="signals" class="chips"></div></div>
            <div class="section"><h4>回答这三个问题</h4><ol id="questions"></ol></div>
            <div class="section"><h4>现在可以做的安全动作</h4><ul id="steps"></ul></div>
            <div class="notice"><strong>边界</strong><p id="disclaimer"></p></div>
          </div>
          <p id="error" class="error hidden"></p>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
